<VirtualHost *:8080>
    ServerName teacher-eval.onrender.com
    ServerAlias *.onrender.com localhost
    
    DocumentRoot /var/www/html
    
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Enable rewrite engine
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            
            # Don't rewrite PWA files
            RewriteCond %{REQUEST_URI} ^/pwa/ [OR]
            RewriteCond %{REQUEST_URI} ^/assets/ [OR]
            RewriteCond %{REQUEST_URI} ^/icons/ [OR]
            RewriteCond %{REQUEST_URI} ^/favicon.png$
            RewriteRule ^(.*)$ - [L]
            
            # Don't rewrite if it's a real file
            RewriteCond %{REQUEST_FILENAME} -f
            RewriteRule ^(.*)$ - [L]
            
            # Don't rewrite if it's a real directory
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^(.*)$ - [L]
            
            # Route everything else to index.php
            RewriteRule ^(.*)$ index.php?request=$1 [QSA,L]
        </IfModule>
    </Directory>
    
    <Directory /var/www/html/assets>
        <IfModule mod_rewrite.c>
            RewriteEngine Off
        </IfModule>
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>
    
    <Directory /var/www/html/pwa>
        <IfModule mod_rewrite.c>
            RewriteEngine Off
        </IfModule>
        Header set Cache-Control "public, max-age=3600"
    </Directory>
    
    <FilesMatch "\.(js|css|png|jpg|jpeg|gif|svg|wasm|ttf|woff|woff2)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
