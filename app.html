<!DOCTYPE html>
<html>
<head>
  <base href="/teacher-eval/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Evaluation</title>
  <link rel="manifest" href="pwa/manifest.json">
  <!-- Load API redirect BEFORE Flutter app to intercept requests -->
  <script src="assets/js/api-redirect.js"></script>
  <!-- Already Evaluated Modal Handler -->
  <script src="assets/js/already-evaluated-modal.js"></script>
  
  <!-- Loading Screen Styles -->
  <link rel="stylesheet" href="assets/css/loading-screen.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <!-- Logo -->
      <div class="loading-logo-container">
        <img src="assets/assets/images/fbc_logo2.png" alt="Fullbright College" class="loading-logo">
      </div>

      <!-- Title -->
      <h1 class="loading-title">Teacher Evaluation</h1>
      
      <!-- Subtitle -->
      <p class="loading-subtitle">Fullbright College Inc.</p>
      
      <!-- Progress Bar -->
      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>
      
      <!-- Loading Dots -->
      <div class="loading-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- Loading Screen Manager -->
  <script src="assets/js/loading-screen.js"></script>
  <script>
    console.log('Loading Flutter app...');
    const script = document.createElement('script');
    script.src = 'pwa/flutter_bootstrap.js';
    script.async = true;
    document.head.appendChild(script);
  </script>
</body>
</html>
