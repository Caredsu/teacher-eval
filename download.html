<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Teacher Evaluation App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        h1 {
            color: #f1f5f9;
            margin-bottom: 12px;
            font-size: 28px;
        }
        .subtitle {
            color: #cbd5e1;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .download-btn {
            display: inline-block;
            background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5);
        }
        .info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 8px;
            color: #cbd5e1;
            font-size: 13px;
            line-height: 1.6;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status.success {
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
        }
        .status.error {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱</div>
        <h1>Download App</h1>
        <p class="subtitle">Fullbright College Inc. - Teacher Evaluation</p>
        
        <button class="download-btn" onclick="downloadAPK()">
            ⬇️ Download APK
        </button>
        
        <div class="info">
            <strong>Requirements:</strong><br>
            • Android 5.0 or higher<br>
            • 50MB storage space<br>
            • Internet connection
        </div>
        
        <div id="status"></div>
    </div>

    <script>
        function downloadAPK() {
            const btn = document.querySelector('.download-btn');
            const statusDiv = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = '⏳ Downloading...';
            statusDiv.innerHTML = '';
            
            // Start download
            const link = document.createElement('a');
            link.href = '/teacher-eval/api/download-apk.php';
            link.download = 'teacher-eval.apk';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // Reset button after a delay
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = '⬇️ Download APK';
                statusDiv.innerHTML = '<div class="status success">✓ Download started. Check your Downloads folder.</div>';
            }, 1500);
        }

        // Check if APK exists on page load
        fetch('/teacher-eval/api/download-apk.php', { method: 'HEAD' })
            .then(res => {
                if (res.status === 404) {
                    document.getElementById('status').innerHTML = '<div class="status error">⚠️ APK file not available yet.</div>';
                    document.querySelector('.download-btn').disabled = true;
                }
            })
            .catch(err => console.log('Check APK availability'));
    </script>
</body>
</html>
