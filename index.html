<!DOCTYPE html>
<html>
<head>
  <base href="/teacher-eval/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Teacher Evaluation System - Fullbright College Inc.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Teacher Evaluation System</title>
  <link rel="manifest" href="pwa/manifest.json">
  
  <!-- Loading Screen Styles -->
  <link rel="stylesheet" href="assets/css/loading-screen.css">
  
  <!-- Material Icons - Local + CDN Fallback -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    /* Force Material Icons to load */
    @font-face {
      font-family: 'Material Icons';
      font-style: normal;
      font-weight: 400;
      src: url('https://fonts.gstatic.com/s/materialicons/v140/flUhRq6tzZsQSNCMjMnFZQ.woff2') format('woff2');
    }
    .material-icons {
      font-family: 'Material Icons' !important;
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <!-- Logo -->
      <div class="loading-logo-container">
        <img src="assets/assets/images/fbc_logo2.png" alt="Fullbright College" class="loading-logo">
      </div>

      <!-- Title -->
      <h1 class="loading-title">Teacher Evaluation</h1>
      
      <!-- Subtitle -->
      <p class="loading-subtitle">Fullbright College Inc.</p>
      
      <!-- Progress Bar -->
      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>
      
      <!-- Loading Dots -->
      <div class="loading-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- Load API redirect first to intercept requests -->
  <script src="assets/js/api-redirect.js"></script>
  <!-- Already Evaluated Modal Handler - Load after API redirect -->
  <script src="assets/js/already-evaluated-modal.js"></script>
  <!-- Loading Screen Manager -->
  <script src="assets/js/loading-screen.js"></script>
  <script>
    console.log('[LOADING] Teacher Evaluation System...');
    const s = document.createElement('script');
    s.src = 'pwa/flutter_bootstrap.js';
    s.async = true;
    document.head.appendChild(s);
  </script>
</body>
</html>
