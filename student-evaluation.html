<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Evaluation - Anonymous</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .rating-group {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        
        .rating-btn {
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: all 0.3s;
            font-size: 16px;
        }
        
        .rating-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .rating-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .questions {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        
        .question-item {
            margin-bottom: 25px;
        }
        
        .question-text {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            margin-bottom: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .disabled input,
        .disabled select,
        .disabled textarea,
        .disabled button {
            cursor: not-allowed;
        }
        
        .info-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #333;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Teacher Evaluation</h1>
        <p class="subtitle">Help us improve - Your feedback matters!</p>
        
        <div class="info-box">
            🔒 <strong>Anonymous:</strong> Your identity is never recorded. Only your feedback matters.
        </div>
        
        <div id="message" class="message"></div>
        
        <form id="evaluationForm">
            <!-- Teacher Selection -->
            <div class="form-group">
                <label for="teacher">Select Teacher *</label>
                <select id="teacher" required>
                    <option value="">-- Choose a teacher --</option>
                </select>
            </div>
            
            <!-- Questions will be inserted here -->
            <div id="questionsContainer"></div>
            
            <!-- Feedback -->
            <div class="form-group">
                <label for="feedback">Additional Feedback (optional)</label>
                <textarea id="feedback" placeholder="Share your thoughts..."></textarea>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">
                ✓ Submit Evaluation
            </button>
            
            <!-- Loading State -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Submitting...</p>
            </div>
        </form>
    </div>

    <script src="/assets/js/duplicate-prevention.js"></script>
    <script>
        const API_BASE = '/api';
        const form = document.getElementById('evaluationForm');
        const teacherSelect = document.getElementById('teacher');
        const questionsContainer = document.getElementById('questionsContainer');
        const messageDiv = document.getElementById('message');
        const loadingDiv = document.getElementById('loading');
        
        let questions = [];
        let selectedRatings = {};
        
        // Load teachers on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadTeachers();
            await loadQuestions();
        });
        
        /**
         * Load teachers from API
         */
        async function loadTeachers() {
            try {
                const response = await fetch(`${API_BASE}/teachers`);
                const result = await response.json();
                
                if (result.success && result.data) {
                    const teachers = result.data;
                    teachers.forEach(teacher => {
                        const option = document.createElement('option');
                        option.value = teacher._id || teacher.id;
                        option.textContent = teacher.full_name || teacher.name || 'Unknown';
                        teacherSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading teachers:', error);
                showMessage('⚠️ Could not load teachers. Please refresh the page.', 'error');
            }
        }
        
        /**
         * Load questions from API
         */
        async function loadQuestions() {
            try {
                const response = await fetch(`${API_BASE}/questions`);
                const result = await response.json();
                
                if (result.success && result.data) {
                    questions = result.data;
                    renderQuestions();
                }
            } catch (error) {
                console.error('Error loading questions:', error);
                showMessage('⚠️ Could not load questions. Please refresh the page.', 'error');
            }
        }
        
        /**
         * Render questions in the form
         */
        function renderQuestions() {
            if (questions.length === 0) {
                questionsContainer.innerHTML = '<p style="color: #999;">No questions available</p>';
                return;
            }
            
            questionsContainer.innerHTML = questions.map((q, index) => `
                <div class="form-group">
                    <label class="question-text">${index + 1}. ${q.text || q.question_text}</label>
                    <div class="rating-group">
                        ${[1, 2, 3, 4, 5].map(rating => `
                            <button type="button" class="rating-btn" data-question="${q._id || q.id}" data-rating="${rating}">
                                ${rating}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            
            // Add click handlers to rating buttons
            document.querySelectorAll('.rating-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const questionId = btn.dataset.question;
                    const rating = parseInt(btn.dataset.rating);
                    
                    // Update selected rating
                    selectedRatings[questionId] = rating;
                    
                    // Update UI
                    document.querySelectorAll(`[data-question="${questionId}"]`).forEach(b => {
                        b.classList.remove('selected');
                    });
                    btn.classList.add('selected');
                });
            });
        }
        
        /**
         * Show message to user
         */
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message show ${type}`;
            
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.classList.remove('show');
                }, 3000);
            }
        }
        
        /**
         * Form submission
         */
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Validate
            if (!teacherSelect.value) {
                showMessage('❌ Please select a teacher', 'error');
                return;
            }
            
            if (Object.keys(selectedRatings).length === 0) {
                showMessage('❌ Please rate at least one question', 'error');
                return;
            }
            
            const feedback = document.getElementById('feedback').value.trim();
            if (feedback && feedback.length < 10) {
                showMessage('❌ Feedback must be at least 10 characters', 'error');
                return;
            }
            
            // Prepare data
            const teacherId = teacherSelect.value;
            const evaluationData = {
                teacher_id: teacherId,
                answers: selectedRatings,
                feedback: feedback || ''
            };
            
            // Submit with duplicate prevention
            loadingDiv.classList.add('show');
            form.classList.add('disabled');
            
            const result = await submitEvaluationWithDuplicateCheck(teacherId, evaluationData);
            
            loadingDiv.classList.remove('show');
            
            if (result.success) {
                showMessage(`✅ ${result.message}`, 'success');
                
                // Reset form after 2 seconds
                setTimeout(() => {
                    form.reset();
                    selectedRatings = {};
                    document.querySelectorAll('.rating-btn').forEach(btn => {
                        btn.classList.remove('selected');
                    });
                    form.classList.remove('disabled');
                }, 2000);
            } else {
                showMessage(`❌ ${result.message}`, 'error');
                form.classList.remove('disabled');
            }
        });
    </script>
</body>
</html>
